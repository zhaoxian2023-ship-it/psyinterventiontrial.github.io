<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>对话 · 心间</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #F4EFE6;
  --bg-card: #FBF8F1;
  --ink: #2A3A36;
  --ink-soft: #5C6B66;
  --ink-muted: #8C9994;
  --accent: #2F5D54;
  --accent-deep: #1F3F39;
  --accent-soft: #E5EBE8;
  --user-bubble: #5A8A7A;
  --user-bubble-deep: #3F6B5C;
  --terra: #C97B5C;
  --line: #DDD3C2;
  --line-soft: #E8E0D0;
  --shadow: 0 1px 2px rgba(42,58,54,.04), 0 4px 16px rgba(42,58,54,.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family: "Noto Serif SC", Georgia, serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.6;
}
button{font-family:inherit;cursor:pointer;}

.chat-wrap{
  max-width: 480px;
  margin: 0 auto;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: var(--bg);
  position: relative;
  box-shadow: 0 0 60px rgba(42,58,54,.08);
}
@media (min-width: 900px){ .chat-wrap{ max-width: 540px; } }

/* 顶部 */
.chat-top{
  display: flex; align-items: center; justify-content: space-between;
  padding: 12px 16px;
  background: var(--bg-card);
  border-bottom: 1px solid var(--line);
  position: relative;
  z-index: 10;
}
.top-back, .top-menu{
  width: 36px; height: 36px;
  border: none;
  background: transparent;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  color: var(--ink-soft);
  transition: background .2s;
}
.top-back:hover, .top-menu:hover{ background: var(--line-soft); }
.top-back svg, .top-menu svg{ width: 20px; height: 20px; }
.chat-title{
  flex: 1;
  text-align: center;
  font-weight: 500;
  font-size: 16px;
  color: var(--ink);
}
.chat-title .sub{
  display: block;
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  font-size: 12px;
  color: var(--ink-muted);
  font-weight: 400;
  margin-top: 1px;
}

/* 菜单 */
.menu-pop{
  position: absolute;
  top: 56px; right: 12px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: var(--shadow);
  min-width: 140px;
  z-index: 20;
  display: none;
  overflow: hidden;
}
.menu-pop.show{ display: block; animation: popIn .15s ease-out; }
@keyframes popIn{ from{opacity:0; transform: translateY(-4px) scale(.97);} to{opacity:1; transform:none;} }
.menu-pop button{
  display: block;
  width: 100%;
  padding: 11px 16px;
  text-align: left;
  border: none;
  background: none;
  font-size: 14px;
  color: var(--ink);
  border-bottom: 1px solid var(--line-soft);
  transition: background .15s;
}
.menu-pop button:last-child{ border-bottom: none; }
.menu-pop button:hover{ background: var(--accent-soft); }
.menu-pop button.danger{ color: var(--terra); }

/* 消息区 */
.msgs{
  flex: 1;
  overflow-y: auto;
  padding: 16px 14px 8px;
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.msgs::-webkit-scrollbar{ width: 4px; }
.msgs::-webkit-scrollbar-thumb{ background: var(--line); border-radius: 2px; }

/* 时间戳 */
.time-stamp{
  text-align: center;
  font-size: 11px;
  color: var(--ink-muted);
  margin: 4px 0;
  letter-spacing: .05em;
}
.time-stamp::before, .time-stamp::after{
  content: "";
  display: inline-block;
  width: 24px; height: 1px;
  background: var(--line);
  vertical-align: middle;
  margin: 0 8px;
}

/* 消息气泡 */
.msg{
  display: flex;
  gap: 8px;
  max-width: 100%;
  animation: msgIn .25s ease-out;
}
@keyframes msgIn{ from{opacity:0; transform: translateY(6px);} to{opacity:1; transform:none;} }
.msg.user{ flex-direction: row-reverse; }
.msg-avatar{
  width: 36px; height: 36px;
  border-radius: 50%;
  flex-shrink: 0;
  display: flex; align-items: center; justify-content: center;
  color: white;
  font-family: "Cormorant Garamond", serif;
  font-size: 17px;
  font-style: italic;
}
.msg.ai .msg-avatar{
  background: linear-gradient(135deg, var(--accent), var(--accent-deep));
}
.msg.user .msg-avatar{
  background: linear-gradient(135deg, var(--user-bubble), var(--user-bubble-deep));
}
.msg-bubble{
  padding: 10px 14px;
  border-radius: 4px;
  max-width: 78%;
  font-size: 14.5px;
  line-height: 1.65;
  word-wrap: break-word;
  white-space: pre-wrap;
  position: relative;
}
.msg.ai .msg-bubble{
  background: var(--bg-card);
  color: var(--ink);
  border: 1px solid var(--line);
  border-top-left-radius: 1px;
}
.msg.user .msg-bubble{
  background: var(--user-bubble);
  color: white;
  border-top-right-radius: 1px;
}

/* 思考中 */
.thinking{
  display: flex; align-items: center; gap: 4px;
  padding: 4px 0;
}
.thinking span{
  width: 6px; height: 6px;
  background: var(--ink-muted);
  border-radius: 50%;
  animation: thinking 1.2s infinite;
}
.thinking span:nth-child(2){ animation-delay: .15s; }
.thinking span:nth-child(3){ animation-delay: .3s; }
@keyframes thinking{
  0%, 60%, 100%{ opacity: .3; transform: translateY(0); }
  30%{ opacity: 1; transform: translateY(-3px); }
}

/* 引导/欢迎 */
.welcome-card{
  margin: 24px auto 12px;
  max-width: 320px;
  padding: 24px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  text-align: center;
}
.welcome-card h3{
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  font-size: 22px;
  font-weight: 400;
  color: var(--ink);
  margin-bottom: 6px;
}
.welcome-card p{
  font-size: 13px;
  color: var(--ink-muted);
  line-height: 1.7;
}
.welcome-decor{
  display: flex; align-items: center; justify-content: center; gap: 10px;
  margin-bottom: 12px;
  color: var(--terra);
}
.welcome-decor::before, .welcome-decor::after{
  content: ""; width: 30px; height: 1px; background: var(--line);
}

/* 输入区 */
.input-area{
  background: var(--bg-card);
  border-top: 1px solid var(--line);
  padding: 10px 12px max(10px, env(safe-area-inset-bottom));
  display: flex; align-items: flex-end; gap: 8px;
}
.input-box{
  flex: 1;
  background: var(--bg);
  border: 1px solid var(--line);
  border-radius: 4px;
  display: flex; align-items: flex-end;
}
.input-box:focus-within{ border-color: var(--accent); background: white; }
.txt{
  flex: 1;
  border: none;
  background: transparent;
  resize: none;
  font-family: inherit;
  font-size: 15px;
  line-height: 1.5;
  color: var(--ink);
  padding: 11px 14px;
  max-height: 96px;
  min-height: 22px;
  outline: none;
}
.send-btn{
  width: 42px; height: 42px;
  background: var(--accent-deep);
  color: var(--bg-card);
  border: none;
  border-radius: 4px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
  transition: all .2s;
}
.send-btn:disabled{ opacity: .5; cursor: not-allowed; }
.send-btn:not(:disabled):hover{ background: var(--accent); }
.send-btn svg{ width: 18px; height: 18px; }

/* 空状态启发提问 */
.starters{
  display: flex; flex-direction: column; gap: 8px;
  margin: 16px auto 0;
  max-width: 320px;
  padding: 0 16px;
}
.starter{
  padding: 11px 14px;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  font-size: 13.5px;
  color: var(--ink-soft);
  text-align: left;
  transition: all .2s;
}
.starter:hover{
  border-color: var(--accent);
  color: var(--ink);
  background: var(--accent-soft);
}

/* Toast */
.toast{
  position: fixed; top: 80px; left: 50%; transform: translateX(-50%);
  background: var(--ink);
  color: var(--bg-card);
  padding: 9px 16px;
  border-radius: 2px;
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  transition: opacity .25s;
  max-width: 90%;
}
.toast.show{ opacity: 1; }
</style>
</head>
<body>
<div class="chat-wrap">
  <header class="chat-top">
    <button class="top-back" id="btn-back" aria-label="返回">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <div class="chat-title">
      心间助手
      <span class="sub">a quiet companion</span>
    </div>
    <button class="top-menu" id="btn-menu" aria-label="菜单">
      <svg viewBox="0 0 24 24" fill="currentColor"><circle cx="5" cy="12" r="1.6"/><circle cx="12" cy="12" r="1.6"/><circle cx="19" cy="12" r="1.6"/></svg>
    </button>
    <div class="menu-pop" id="menu-pop">
      <button id="menu-pin">置顶对话</button>
      <button id="menu-rename">重命名</button>
      <button id="menu-clear" class="danger">清空记录</button>
    </div>
  </header>

  <div class="msgs" id="msgs">
    <!-- 欢迎卡片 -->
    <div class="welcome-card">
      <div class="welcome-decor"><span style="font-size:10px;letter-spacing:.2em">A NEW CONVERSATION</span></div>
      <h3>I'm here to listen.</h3>
      <p>欢迎来到心间。<br>不必整理思绪,想到什么就说什么。</p>
    </div>
    <div class="starters" id="starters">
      <button class="starter">最近有些事让我感到焦虑...</button>
      <button class="starter">我想聊聊今天的心情</button>
      <button class="starter">最近睡眠不太好,该怎么调节?</button>
    </div>
  </div>

  <div class="input-area">
    <div class="input-box">
      <textarea class="txt" id="txt" rows="1" placeholder="输入消息(Enter 发送 · Shift+Enter 换行)"></textarea>
    </div>
    <button class="send-btn" id="send" disabled aria-label="发送">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/>
      </svg>
    </button>
  </div>
</div>

<div class="toast" id="toast">提示</div>

<script>
const msgs = document.getElementById('msgs');
const txt = document.getElementById('txt');
const send = document.getElementById('send');
const toastEl = document.getElementById('toast');

function toast(m){
  toastEl.textContent = m;
  toastEl.classList.add('show');
  clearTimeout(toastEl._tm);
  toastEl._tm = setTimeout(() => toastEl.classList.remove('show'), 1700);
}

// 自动扩展
txt.addEventListener('input', () => {
  txt.style.height = 'auto';
  txt.style.height = Math.min(txt.scrollHeight, 96) + 'px';
  send.disabled = !txt.value.trim();
});

// 启动语句点击
document.querySelectorAll('.starter').forEach(s => {
  s.addEventListener('click', () => {
    txt.value = s.textContent;
    txt.dispatchEvent(new Event('input'));
    txt.focus();
  });
});

// 发送
function sendMsg(){
  const v = txt.value.trim();
  if (!v) return;

  // 移除欢迎卡片和启动语
  const wc = document.querySelector('.welcome-card');
  const st = document.getElementById('starters');
  if (wc) wc.remove();
  if (st) st.remove();

  // 时间戳
  if (!msgs.querySelector('.time-stamp')) {
    const ts = document.createElement('div');
    ts.className = 'time-stamp';
    const now = new Date();
    ts.textContent = `${now.getHours().toString().padStart(2,'0')}:${now.getMinutes().toString().padStart(2,'0')}`;
    msgs.appendChild(ts);
  }

  // 用户消息
  appendMsg('user', v);

  txt.value = '';
  txt.style.height = 'auto';
  send.disabled = true;

  // AI 思考占位
  const thinkingNode = appendMsg('ai', '', true);

  // 此处接入实际 API
  // 演示:模拟延时后显示等待真实接入提示
  setTimeout(() => {
    thinkingNode.remove();
    appendMsg('ai', '〔 此处将由 DeepSeek API 实时返回内容 〕\n\n请在后端 /api/chat 接口接入大模型后,前端会逐字展示真实回复。');
  }, 1100);
}

function appendMsg(role, text, isThinking = false){
  const el = document.createElement('div');
  el.className = 'msg ' + role;
  const avatar = role === 'ai' ? 'M' : 'You';
  el.innerHTML = `
    <div class="msg-avatar">${role === 'ai' ? 'M' : 'Y'}</div>
    <div class="msg-bubble">${
      isThinking
        ? '<div class="thinking"><span></span><span></span><span></span></div>'
        : escapeHtml(text)
    }</div>
  `;
  msgs.appendChild(el);
  msgs.scrollTop = msgs.scrollHeight;
  return el;
}

function escapeHtml(s){
  return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}

send.addEventListener('click', sendMsg);
txt.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey){
    e.preventDefault();
    sendMsg();
  }
});

// 返回
document.getElementById('btn-back').addEventListener('click', () => {
  window.location.href = 'home.html';
});

// 菜单
const menuBtn = document.getElementById('btn-menu');
const menuPop = document.getElementById('menu-pop');
menuBtn.addEventListener('click', e => {
  e.stopPropagation();
  menuPop.classList.toggle('show');
});
document.addEventListener('click', () => menuPop.classList.remove('show'));

document.getElementById('menu-pin').addEventListener('click', () => {
  toast('已置顶对话');
  menuPop.classList.remove('show');
});
document.getElementById('menu-rename').addEventListener('click', () => {
  const n = prompt('重命名对话:', '心间助手');
  if (n) document.querySelector('.chat-title').firstChild.textContent = n;
  menuPop.classList.remove('show');
});
document.getElementById('menu-clear').addEventListener('click', () => {
  if (confirm('确定清空所有对话记录吗?')){
    msgs.innerHTML = '';
    toast('记录已清空');
  }
  menuPop.classList.remove('show');
});

txt.focus();
</script>
</body>
</html>
