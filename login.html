<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>心间 MindSpace · 登录</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg: #F4EFE6;
  --bg-card: #FBF8F1;
  --ink: #2A3A36;
  --ink-soft: #5C6B66;
  --ink-muted: #8C9994;
  --accent: #2F5D54;
  --accent-deep: #1F3F39;
  --terra: #C97B5C;
  --line: #DDD3C2;
  --line-soft: #E8E0D0;
  --error: #B5462E;
  --success: #4A7C59;
  --shadow: 0 1px 2px rgba(42,58,54,.04), 0 8px 32px rgba(42,58,54,.06);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{
  font-family: "Noto Serif SC", Georgia, serif;
  background: var(--bg);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.6;
  overflow: hidden;
}

/* 背景装饰 */
.bg-decor{
  position:fixed; inset:0; pointer-events:none; z-index:0;
  background:
    radial-gradient(ellipse at 15% 20%, rgba(47,93,84,.08) 0%, transparent 50%),
    radial-gradient(ellipse at 85% 80%, rgba(201,123,92,.07) 0%, transparent 50%);
}
.bg-decor::after{
  content:""; position:absolute; inset:0;
  background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence baseFrequency='.9' numOctaves='2'/><feColorMatrix values='0 0 0 0 .16 0 0 0 0 .22 0 0 0 0 .21 0 0 0 .04 0'/></filter><rect width='100%' height='100%' filter='url(%23n)'/></svg>");
  opacity:.6;
}

.wrap{
  position:relative; z-index:1;
  height:100vh; display:flex; align-items:center; justify-content:center;
  padding: 24px;
  overflow-y:auto;
}

.shell{
  width:100%; max-width: 920px;
  display:grid; grid-template-columns: 1.05fr 1fr;
  background: var(--bg-card);
  border: 1px solid var(--line);
  border-radius: 4px;
  box-shadow: var(--shadow);
  overflow:hidden;
  min-height: 580px;
}

/* 左侧品牌区 */
.brand{
  position:relative;
  padding: 56px 48px;
  background: linear-gradient(155deg, #2F5D54 0%, #1F3F39 70%, #163029 100%);
  color: #F4EFE6;
  display:flex; flex-direction:column; justify-content:space-between;
  overflow:hidden;
}
.brand::before{
  content:""; position:absolute; top:-30%; right:-20%;
  width: 120%; height: 80%;
  background: radial-gradient(circle, rgba(201,123,92,.18) 0%, transparent 60%);
  pointer-events:none;
}
.brand::after{
  content:""; position:absolute; bottom:-50%; left:-30%;
  width: 100%; height: 100%;
  background: radial-gradient(circle, rgba(244,239,230,.05) 0%, transparent 60%);
  pointer-events:none;
}
.logo{
  display:flex; align-items:baseline; gap:10px;
  position:relative; z-index:1;
}
.logo-mark{
  width:32px; height:32px; border-radius:50%;
  background: var(--terra);
  position:relative;
  box-shadow: 0 0 0 4px rgba(244,239,230,.12);
  align-self:center;
}
.logo-mark::after{
  content:""; position:absolute; inset:8px;
  border-radius:50%; background: var(--bg-card);
}
.logo-name{
  font-family: "Cormorant Garamond", serif;
  font-size: 28px; font-weight: 500; letter-spacing: .02em;
}
.logo-zh{
  font-size: 18px; font-weight: 500; opacity:.9;
}

.brand-content{position:relative; z-index:1;}
.brand-title{
  font-family: "Cormorant Garamond", serif;
  font-style: italic;
  font-size: 44px;
  line-height: 1.15;
  font-weight: 400;
  margin: 36px 0 18px;
  color: #F4EFE6;
}
.brand-title .zh{
  display:block;
  font-family: "Noto Serif SC", serif;
  font-style: normal;
  font-size: 32px;
  font-weight: 500;
  letter-spacing: .04em;
  margin-top: 10px;
  color: #F4EFE6;
}
.brand-sub{
  font-size: 14px;
  line-height: 1.9;
  opacity:.78;
  max-width: 320px;
}

.brand-foot{
  position:relative; z-index:1;
  display:flex; align-items:center; gap:16px;
  font-size: 12px; opacity:.55;
  letter-spacing: .15em;
  text-transform: uppercase;
}
.brand-foot::before{
  content:""; flex:1; height:1px;
  background: rgba(244,239,230,.2);
  max-width: 60px;
}

/* 右侧表单 */
.form-side{
  padding: 56px 48px;
  display:flex; flex-direction:column; justify-content:center;
}

.tabs{
  display:flex; gap: 32px;
  border-bottom: 1px solid var(--line);
  margin-bottom: 36px;
}
.tab{
  padding: 12px 0;
  font-family: inherit;
  font-size: 16px;
  font-weight: 500;
  color: var(--ink-muted);
  background: none; border:none; cursor:pointer;
  position:relative;
  letter-spacing: .04em;
  transition: color .25s;
}
.tab.active{ color: var(--accent-deep); }
.tab.active::after{
  content:""; position:absolute; left:0; right:0; bottom:-1px;
  height:2px; background: var(--terra);
}
.tab:hover:not(.active){ color: var(--ink-soft); }

.form-title{
  font-family: "Cormorant Garamond", serif;
  font-size: 32px;
  font-weight: 500;
  color: var(--ink);
  margin-bottom: 4px;
}
.form-hint{
  font-size: 13px;
  color: var(--ink-muted);
  margin-bottom: 28px;
  letter-spacing: .02em;
}

.field{
  margin-bottom: 18px;
}
.field label{
  display:block;
  font-size: 12px;
  letter-spacing: .12em;
  text-transform: uppercase;
  color: var(--ink-soft);
  margin-bottom: 8px;
  font-weight: 500;
}
.input-wrap{
  position:relative;
}
.input{
  width: 100%;
  padding: 12px 14px;
  font-family: inherit;
  font-size: 15px;
  color: var(--ink);
  background: transparent;
  border: 1px solid var(--line);
  border-radius: 2px;
  transition: border-color .2s, background .2s;
}
.input:focus{
  outline:none;
  border-color: var(--accent);
  background: #fff;
}
.input::placeholder{ color: var(--ink-muted); opacity:.7; }
.input.has-icon{ padding-right: 44px; }

.eye-btn{
  position:absolute; right: 8px; top: 50%; transform: translateY(-50%);
  width: 32px; height: 32px;
  background:none; border:none; cursor:pointer;
  color: var(--ink-muted);
  display:flex; align-items:center; justify-content:center;
  border-radius: 2px;
}
.eye-btn:hover{ color: var(--ink); background: var(--line-soft); }
.eye-btn svg{ width: 18px; height: 18px; }

.row{
  display:flex; justify-content:space-between; align-items:center;
  margin: 8px 0 24px;
  font-size: 13px;
}
.checkbox{
  display:flex; align-items:center; gap:8px;
  cursor:pointer; color: var(--ink-soft);
}
.checkbox input{
  width:14px; height:14px; accent-color: var(--accent);
}
.link{
  color: var(--accent);
  text-decoration:none;
  border-bottom: 1px solid transparent;
  transition: border-color .2s;
}
.link:hover{ border-bottom-color: var(--accent); }

.btn{
  width:100%;
  padding: 14px 20px;
  font-family: inherit;
  font-size: 15px;
  font-weight: 500;
  letter-spacing: .08em;
  color: var(--bg-card);
  background: var(--accent-deep);
  border: none;
  border-radius: 2px;
  cursor: pointer;
  transition: background .2s, transform .1s;
  display:flex; align-items:center; justify-content:center; gap: 10px;
}
.btn:hover{ background: var(--accent); }
.btn:active{ transform: scale(.99); }
.btn:disabled{ opacity:.6; cursor: not-allowed; }
.btn .arrow{ transition: transform .25s; }
.btn:hover .arrow{ transform: translateX(4px); }

/* 提示 */
.alert{
  padding: 10px 14px;
  border-radius: 2px;
  font-size: 13px;
  margin-bottom: 16px;
  display:none;
  border-left: 3px solid;
}
.alert.show{ display:block; animation: slideIn .25s ease-out; }
.alert.error{ background: #FBEBE5; color: var(--error); border-color: var(--error); }
.alert.success{ background: #E8F0E8; color: var(--success); border-color: var(--success); }
@keyframes slideIn{ from{opacity:0; transform:translateY(-4px);} to{opacity:1; transform:none;} }

.divider-foot{
  text-align:center;
  font-size: 12px;
  color: var(--ink-muted);
  margin-top: 28px;
  letter-spacing: .02em;
}

/* 移动端 */
@media (max-width: 760px){
  body{ overflow-y: auto; }
  .wrap{ padding: 0; height: auto; min-height: 100vh; }
  .shell{
    grid-template-columns: 1fr;
    border-radius: 0;
    border: none;
    min-height: 100vh;
  }
  .brand{
    padding: 32px 28px 28px;
    min-height: 220px;
  }
  .brand-title{ font-size: 32px; margin: 18px 0 10px; }
  .brand-title .zh{ font-size: 24px; margin-top: 6px; }
  .brand-sub{ font-size: 13px; }
  .brand-foot{ margin-top: 18px; }
  .form-side{ padding: 32px 28px 40px; }
  .form-title{ font-size: 26px; }
  .tabs{ gap: 24px; margin-bottom: 24px; }
}
</style>
</head>
<body>
<div class="bg-decor"></div>

<div class="wrap">
  <div class="shell">
    <!-- 左侧品牌 -->
    <aside class="brand">
      <div class="logo">
        <span class="logo-mark"></span>
        <span class="logo-name">MindSpace</span>
        <span class="logo-zh">心间</span>
      </div>
      <div class="brand-content">
        <h1 class="brand-title">
          <em>A quiet place</em>
          <span class="zh">情绪的栖息地</span>
        </h1>
        <p class="brand-sub">
          通过对话、记录与练习,逐渐认识自己的情绪。<br>
          这里不评判,只陪伴。
        </p>
      </div>
      <div class="brand-foot">
        <span>research · v1.0</span>
      </div>
    </aside>

    <!-- 右侧表单 -->
    <section class="form-side">
      <div class="tabs">
        <button class="tab active" data-tab="login">登 录</button>
        <button class="tab" data-tab="register">注 册</button>
      </div>

      <div id="alert" class="alert"></div>

      <!-- 登录表单 -->
      <form id="form-login" class="form-panel">
        <h2 class="form-title">欢迎回来</h2>
        <p class="form-hint">请使用您的账号继续</p>

        <div class="field">
          <label for="login-user">用户名 / 邮箱</label>
          <div class="input-wrap">
            <input class="input" type="text" id="login-user" placeholder="输入用户名或邮箱" autocomplete="username">
          </div>
        </div>

        <div class="field">
          <label for="login-pwd">密码</label>
          <div class="input-wrap">
            <input class="input has-icon" type="password" id="login-pwd" placeholder="至少 6 位" autocomplete="current-password">
            <button type="button" class="eye-btn" data-toggle="login-pwd" aria-label="显示/隐藏密码">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="row">
          <label class="checkbox"><input type="checkbox"> 记住我</label>
          <a href="#" class="link" id="forgot-link">忘记密码?</a>
        </div>

        <button type="submit" class="btn">
          <span>进 入</span>
          <span class="arrow">→</span>
        </button>
      </form>

      <!-- 注册表单 -->
      <form id="form-register" class="form-panel" style="display:none">
        <h2 class="form-title">建立账号</h2>
        <p class="form-hint">开始你的情绪记录之旅</p>

        <div class="field">
          <label for="reg-user">用户名</label>
          <div class="input-wrap">
            <input class="input" type="text" id="reg-user" placeholder="3-20 个字符" autocomplete="username">
          </div>
        </div>

        <div class="field">
          <label for="reg-email">邮箱</label>
          <div class="input-wrap">
            <input class="input" type="email" id="reg-email" placeholder="用于找回密码" autocomplete="email">
          </div>
        </div>

        <div class="field">
          <label for="reg-pwd">密码</label>
          <div class="input-wrap">
            <input class="input has-icon" type="password" id="reg-pwd" placeholder="至少 6 位" autocomplete="new-password">
            <button type="button" class="eye-btn" data-toggle="reg-pwd" aria-label="显示/隐藏密码">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="field">
          <label for="reg-pwd2">确认密码</label>
          <div class="input-wrap">
            <input class="input has-icon" type="password" id="reg-pwd2" placeholder="再次输入" autocomplete="new-password">
            <button type="button" class="eye-btn" data-toggle="reg-pwd2" aria-label="显示/隐藏密码">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6"><path d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7S2 12 2 12z"/><circle cx="12" cy="12" r="3"/></svg>
            </button>
          </div>
        </div>

        <div class="row" style="margin-top:14px;">
          <label class="checkbox"><input type="checkbox" id="reg-agree"> 我已阅读并同意 <a href="#" class="link">研究知情同意书</a></label>
        </div>

        <button type="submit" class="btn">
          <span>创建账号</span>
          <span class="arrow">→</span>
        </button>
      </form>

      <p class="divider-foot">本平台用于学术研究 · 数据将被匿名处理</p>
    </section>
  </div>
</div>

<script>
// 标签切换
const tabs = document.querySelectorAll('.tab');
const formLogin = document.getElementById('form-login');
const formReg = document.getElementById('form-register');
const alertEl = document.getElementById('alert');

tabs.forEach(t => t.addEventListener('click', () => {
  tabs.forEach(x => x.classList.remove('active'));
  t.classList.add('active');
  hideAlert();
  if (t.dataset.tab === 'login') {
    formLogin.style.display = ''; formReg.style.display = 'none';
  } else {
    formLogin.style.display = 'none'; formReg.style.display = '';
  }
}));

// 密码可见切换
document.querySelectorAll('.eye-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    const inp = document.getElementById(btn.dataset.toggle);
    inp.type = inp.type === 'password' ? 'text' : 'password';
  });
});

function showAlert(msg, type='error'){
  alertEl.className = 'alert show ' + type;
  alertEl.textContent = msg;
}
function hideAlert(){ alertEl.className = 'alert'; }

// 登录提交
formLogin.addEventListener('submit', e => {
  e.preventDefault();
  const u = document.getElementById('login-user').value.trim();
  const p = document.getElementById('login-pwd').value;
  if (!u) return showAlert('请输入用户名或邮箱');
  if (p.length < 6) return showAlert('密码至少 6 位');
  showAlert('登录成功,正在进入...', 'success');
  setTimeout(() => { window.location.href = 'home.html'; }, 700);
});

// 注册提交
formReg.addEventListener('submit', e => {
  e.preventDefault();
  const u = document.getElementById('reg-user').value.trim();
  const em = document.getElementById('reg-email').value.trim();
  const p1 = document.getElementById('reg-pwd').value;
  const p2 = document.getElementById('reg-pwd2').value;
  const agree = document.getElementById('reg-agree').checked;
  if (u.length < 3) return showAlert('用户名至少 3 个字符');
  if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(em)) return showAlert('请输入有效邮箱');
  if (p1.length < 6) return showAlert('密码至少 6 位');
  if (p1 !== p2) return showAlert('两次输入的密码不一致');
  if (!agree) return showAlert('请先同意研究知情同意书');
  showAlert('账号创建成功,即将进入...', 'success');
  setTimeout(() => { window.location.href = 'home.html'; }, 800);
});

document.getElementById('forgot-link').addEventListener('click', e => {
  e.preventDefault();
  showAlert('找回密码功能将通过邮箱重置链接发送。', 'success');
});
</script>
</body>
</html>
